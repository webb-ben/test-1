name: PyLODE to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.build.outputs.url }}

    steps:
        - uses: cgs-earth/onto-to-pages@main
          id: build
